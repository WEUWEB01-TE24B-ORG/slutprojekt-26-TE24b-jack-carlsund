        <main>
            <h1>Krokodil</h1>
            <figure class="art">
                <img src="./bilder/Krokodil.jpg" alt="">
                <figcaption>Saltvattenkrokodilen, eller deltakrokodilen som den också kallas, är den största arten. De
                    <br>största intygade måtten för arten är 6,3 meter längd och något över ett ton i vikt.[1]
                    Nilkrokodilen
                    <br>är den näst största och kan bli upp till 5,5 meter lång och väga ungefär ett ton.[2] Den minsta
                    <br>arten är dvärgkrokodilen som vanligen har en längd av 1,6 meter (sällan upp till 1,9 meter).[3]
                </figcaption>
            </figure>
            <article>
                <div>
                    <h2>Spetskrokodil</h2>
                    <figure>
                        <img src="./bilder/Spetskrokodilen.jpg" alt="">
                        <p>Spetskrokodil eller amerikansk krokodil (Crocodylus acutus) är en krokodilart som lever i
                            Amerika. Artepitet i det vetenskapliga namnet är det latinska adjektivet acutus
                            (skarp/spetsig), besläktat med verbet acuere samt med substantiven acumen och acus
                            (spets/nål).[2]</p>
                    </figure>
                </div>
                <div>
                    <h2>Pansarkrokodil</h2>
                    <figure>
                        <img src="./bilder/Pansarkrokodil.JPG" alt="uwefeuwfw">
                        <p>Pansarkrokodilen (Crocodylus cataphractus[2]) är en reptil i familjen krokodiler.[3][4]
                            Senare DNA-analyser har visat att den kanske bör räknas till ett eget släkte,
                            Mecistops.[5][6] Den lever i centrala och västra Afrika och når en längd på 3 till 4 meter.
                            Den lever av fisk, grodor och andra smådjur.[1] Inga underarter finns listade.[3]
                        </p>
                    </figure>
                </div>
                <div>
                    <h2>Sötvattenskrokodil</h2>
                    <figure>
                        <img src="./bilder/Sötvattenskrokodil.jpg" alt="">
                        <p>Sötvattenkrokodil eller Johnstonkrokodil (Crocodylus johnstoni eller Crocodylus johnsoni) är
                            en art i familjen krokodiler som lever i sötvatten i norra Australien. Hanarna kan nå en
                            längd på 3 meter medan honorna kan bli drygt 2 meter långa. Den är ljusgråbrun men har mörka
                            ränder på kroppen och svansen. Födan utgörs framförallt av fisk, fladdermöss, mindre
                            kräldjur och fåglar.</p>
                    </figure>
                </div>
            </article>
