<!DOCTYPE html>
<html lang="sv">

<head>
    <!-- Grundinställningar för tecken och mobilanpassning -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reptiler - Krokodiler</title>

    <!-- Koppling till CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ===== HUVUDCONTAINER ===== -->
    <div class="kontainer">

        <!-- ===== HEADER (logga + meny) ===== -->
        <header>

            <!-- Klickbar bild som byter krokodil -->
            <div class="cirkel">
                <img id="krokodilbild1"
                     class="circle"
                     src="./bilder/Spetskrokodilen.jpg"
                     alt="Krokodil bild"
                     onclick="bytKrokodilBild()">
            </div>

            <!-- Navigationsmeny -->
            <nav>
                <a href="sida1.html">Ormar</a>
                <a href="sida2.html" class="aktiv">Krokodiler</a>
                <a href="sida3.html">Ödlor</a>
                <a href="sida4.html">Sköldpaddor</a>
            </nav>

        </header>

        <!-- ===== HUVUDINNEHÅLL ===== -->
        <main>

            <!-- Sidrubrik -->
            <h1>Krokodiler</h1>

            <!-- Stor introduktionsbild -->
            <figure class="art">
                <img src="./bilder/Krokodil.jpg" alt="Bild på krokodil">

                <figcaption>
                    Saltvattenkrokodilen är den största krokodilarten i världen och kan bli över 6 meter lång.
                    Nilkrokodilen är näst störst och dvärgkrokodilen är den minsta arten.
                </figcaption>
            </figure>

            <!-- ===== TRE INFORMATIONSKORT ===== -->
            <article>

                <!-- Spetskrokodil -->
                <div>
                    <h2>Spetskrokodil</h2>
                    <figure>
                        <img src="./bilder/Spetskrokodilen.jpg" alt="Bild på spetskrokodil">
                        <p>
                            Spetskrokodilen lever i Amerika och kallas även amerikansk krokodil.
                            Den har en lång och smal nos och lever i både salt- och sötvatten.
                        </p>
                    </figure>
                </div>

                <!-- Pansarkrokodil -->
                <div>
                    <h2>Pansarkrokodil</h2>
                    <figure>
                        <img src="./bilder/Pansarkrokodil.JPG" alt="Bild på pansarkrokodil">
                        <p>
                            Pansarkrokodilen lever i Afrika och blir upp till 4 meter lång.
                            Den äter främst fisk och smådjur och är inte särskilt aggressiv.
                        </p>
                    </figure>
                </div>

                <!-- Sötvattenskrokodil -->
                <div>
                    <h2>Sötvattenskrokodil</h2>
                    <figure>
                        <img src="./bilder/Sötvattenskrokodil.jpg" alt="Bild på sötvattenskrokodil">
                        <p>
                            Sötvattenskrokodilen lever i Australien och är mindre än andra krokodilarter.
                            Den lever i floder och äter fisk, fåglar och smådjur.
                        </p>
                    </figure>
                </div>

            </article>

            <!-- ===== VIDEO-KNAPP ===== -->
            <div class="video">
                <button onclick="spelaKrokodilVideo()">Spela video</button>
            </div>

            <!-- Video som visas vid klick -->
            <div class="video-lada">
                <iframe width="100%" height="250"
                    src="https://www.youtube.com/embed/mldTwJ-X0U8?si=N2_0FEwW_LjXiu7d"
                    title="YouTube video player"
                    frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowfullscreen>
                </iframe>
            </div>

        </main>

        <!-- ===== SIDOPANEL ===== -->
        <aside>
            <h3>Referenser:</h3>
            <ul>
                <li><a href="https://sv.wikipedia.org/wiki/Spetskrokodil">Spetskrokodil – Wikipedia</a></li>
                <li><a href="https://sv.wikipedia.org/wiki/Pansarkrokodil">Pansarkrokodil – Wikipedia</a></li>
                <li><a href="https://sv.wikipedia.org/wiki/S%C3%B6tvattenkrokodil">Sötvattenskrokodil – Wikipedia</a></li>
            </ul>
        </aside>

        <!-- ===== FOOTER ===== -->
        <footer>
            <h3>Publicerad av: Jack Carlsund TE24b</h3>
        </footer>

    </div>

    <!-- Koppling till JavaScript -->
    <script src="script.js"></script>

</body>

</html>
