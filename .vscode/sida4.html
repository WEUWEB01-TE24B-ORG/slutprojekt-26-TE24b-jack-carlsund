        <main>
            <h1>Sköldpaddor</h1>
            <figure class="art">
                <img src="./bilder/Sköldpadda.jpg" alt="">
                <figcaption>Sköldpaddor (Testudines) är en ordning inom kräldjuren som utmärks av en sköld som skyddar
                    <br>mjukdelarna, och som består av de två underordningarna gömhalssköldpaddor och
                    vändhalssköldpaddor.
                    <br>Sköldpaddor är djur som är kända för sina långsamma rörelser. De tunga klumpiga skalen som
                    begränsar
                    <br>deras steglängd är en stor anledning till det. Landlevande sköldpaddor har korta, stadiga
                    fötter.
                </figcaption>
            </figure>
            <article>
                <div>
                    <h2>Havssjöldpaddor</h2>
                    <figure>
                        <img src="./bilder/Havssköldpadda.JPG" alt="">
                        <p>Havssköldpaddor (Cheloniidae) är en familj i ordningen sköldpaddor med sex arter. Till
                            skillnad från landsköldpaddor kan havssköldpaddor inte dra in huvudet i skalet. Skalet är
                            strömlinjeformat och benen är omvandlade till simfötter. Havssköldpaddor lägger ägg, och
                            gräver ned dem vid stränder. </p>
                    </figure>
                </div>
                <div>
                    <h2>landsköldpaddor</h2>
                    <figure>
                        <img src="./bilder/Landssköldpadda.jpg" alt="uwefeuwfw">
                        <p>Landsköldpaddorna är oftast mindre än sina havslevande släktingar, men det finns även stora
                            arter som galapagossköldpaddorna och aldabrasköldpaddan. En landsköldpadda som är populär
                            att ha som husdjur är rysk stäppsköldpadda. Vissa landsköldpaddor kan leva i mer än 190 år.
                        </p>
                    </figure>
                </div>
                <div>
                    <h2>Chelonia mydas</h2>
                    <figure>
                        <img src="./bilder/Cheloniamydas.JPG" alt="">
                        <p>Namnet syftar på skalens ovansida som ofta har en färgteckning som varierar från grönaktig
                            till mörkbrun. Undersidan samt fogarna mellan skalens plattor är ljusgula. De flesta
                            individer blir omkring 1,5 meter långa och vikten uppgår maximalt till 185 kg. Man har dock
                            träffat på en individ som var 2,5 meter lång och vägde 800 kg.[1] Själva skalet blir upp
                            till 140 centimeter långt. Skalet är ovalt eller hjärtformigt. Extremiteterna och huvudet
                            har en brun färg.</p>
                    </figure>
                </div>
