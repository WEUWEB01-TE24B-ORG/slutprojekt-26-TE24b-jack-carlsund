<!DOCTYPE html>
<html lang="sv">

<head>
    <!-- Grundinställningar för teckenkodning och mobilanpassning -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Reptiler - Sköldpaddor</title>

    <!-- Kopplar in CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Huvudcontainer som håller hela layouten -->
    <div class="kontainer">

        <!-- ================= HEADER ================= -->
        <header>

            <!-- Klickbar bild som byter sköldpadda -->
            <div class="cirkel">
                <img id="sköldpaddabild1"
                     class="circle"
                     src="./bilder/Havssköldpadda.JPG"
                     alt="Sköldpadda"
                     onclick="bytSköldpaddaBild()">
            </div>

            <!-- Navigation mellan sidor -->
            <nav>
                <a href="sida1.html">Ormar</a>
                <a href="sida2.html">Krokodiler</a>
                <a href="sida3.html">Ödlor</a>
                <a href="sida4.html" class="aktiv">Sköldpaddor</a>
            </nav>

        </header>

        <!-- ================= MAIN INNEHÅLL ================= -->
        <main>

            <!-- Sidrubrik -->
            <h1>Sköldpaddor</h1>

            <!-- Stor introduktionsbild + text -->
            <figure class="art">
                <img src="./bilder/Sköldpadda.jpg" alt="Sköldpadda">
                <figcaption>
                    Sköldpaddor (Testudines) är en ordning inom kräldjuren...
                </figcaption>
            </figure>

            <!-- Tre informationsblock om olika sköldpaddor -->
            <article>

                <div>
                    <h2>Havssköldpaddor</h2>
                    <figure>
                        <img src="./bilder/Havssköldpadda.JPG" alt="Havssköldpadda">
                        <p>
                            Havssköldpaddor lever i havet och har simfötter istället för ben...
                        </p>
                    </figure>
                </div>

                <div>
                    <h2>Landsköldpaddor</h2>
                    <figure>
                        <img src="./bilder/Landssköldpadda.jpg" alt="Landsköldpadda">
                        <p>
                            Landsköldpaddor lever på land och kan bli mycket gamla...
                        </p>
                    </figure>
                </div>

                <div>
                    <h2>Chelonia mydas</h2>
                    <figure>
                        <img src="./bilder/Cheloniamydas.jpg" alt="Chelonia mydas">
                        <p>
                            Grön havssköldpadda är en av de största arterna...
                        </p>
                    </figure>
                </div>

            </article>

            <!-- Knapp som visar video -->
            <div class="video">
                <button onclick="spelaSköldpaddsVideo()">Spela video</button>
            </div>

            <!-- Video som visas via JavaScript -->
            <div class="video-lada">
                <iframe width="100%" height="250"
                    src="https://www.youtube.com/embed/GoQeOLQYlos"
                    title="Sköldpaddor video"
                    frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowfullscreen>
                </iframe>
            </div>

        </main>

        <!-- ================= SIDEBAR ================= -->
        <aside>
            <h3>Referenser:</h3>
            <ul>
                <li><a href="https://sv.wikipedia.org/wiki/Havssk%C3%B6ldpaddor">Havssköldpaddor</a></li>
                <li><a href="https://sv.wikipedia.org/wiki/Landsk%C3%B6ldpaddor">Landsköldpaddor</a></li>
                <li><a href="https://sv.wikipedia.org/wiki/Gr%C3%B6n_havssk%C3%B6ldpadda">Chelonia mydas</a></li>
            </ul>
        </aside>

        <!-- ================= FOOTER ================= -->
        <footer>
            <h3>Publicerad av: Jack Carlsund TE24b</h3>
        </footer>

    </div>

    <!-- Kopplar in JavaScript -->
    <script src="script.js"></script>

</body>
</html>
