        <main>
            <h1>Ödla</h1>
            <figure class="art">
                <img src="./bilder/Ödla.jpg" alt="">
                <figcaption>Ödlor (Lacertilia) är en underordning i klassen kräldjur. Ödlor är den artrikaste
                    <br>kräldjursgruppen och förekommer i många olika habitat världen över, utom på Antarktis.
                    Variationen i
                    <br>utseende och levnadssätt är stor, från komodovaranen som kan bli över 3 meter lång till de
                    minsta
                    <br>geckoödlorna som bara blir några få centimeter långa. Till skillnad från ormar har ödlor i de
                    flesta
                    <br>fall fyra ben och en lång svans[1], men det finns även en del ödlor med tillbakabildade ben, som
                    <br>kopparödlan.
                </figcaption>
            </figure>
            <article>
                <div>
                    <h2>Sandödla</h2>
                    <figure>
                        <img src="./bilder/Sandödla.JPG" alt="">
                        <p>Sandödla (Lacerta agilis) är en äggläggande ödla av släktet halsbandsödlor (Lacerta), som
                            föredrar öppna landskapstyper med lägre vegetation. Den förekommer i de tempererade delarna
                            av palearktis, från mellersta och södra Europa, till Sibirien i öster och mellersta Sverige
                            i norr. Det lever av små ryggradslösa djur som insekter.</p>
                    </figure>
                </div>
                <div>
                    <h2>Kameleont</h2>
                    <figure>
                        <img src="./bilder/Kameleont.jpg" alt="uwefeuwfw">
                        <p>Kameleonter (Chamaeleonidae) är en familj i ödlornas underordning och kräldjurens klass. Det
                            finns ungefär 200 kameleontarter.[1] Ordet kameleont kommer från grekiskans "chamaileʹōn"
                            som betyder "litet lejon på marken". Kameleonter påträffas dock sällan på marken utan är
                            utpräglat busk- eller trädlevande.[2]
                        </p>
                    </figure>
                </div>
                <div>
                    <h2>Skogsödla</h2>
                    <figure>
                        <img src="./bilder/Skogsödla.jpg" alt="">
                        <p>Skogsödla (Zootoca vivipara) är en upp till 18 cm lång ödla som placeras i det egna släktet
                            Zootoca. Den förekommer i större delen av Europa och Asien, främst i skog och andra miljöer
                            med fuktigt mikroklimat och hög vegetation.</p>
                    </figure>
                </div>
            </article>
