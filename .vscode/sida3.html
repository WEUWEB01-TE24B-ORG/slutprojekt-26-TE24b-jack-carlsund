<!DOCTYPE html>
<html lang="sv">

<head>
    <!-- Grundinställningar för tecken och mobilanpassning -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reptiler - Ödlor</title>

    <!-- Koppling till CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ===== HUVUDCONTAINER ===== -->
    <div class="kontainer">

        <!-- ===== HEADER (logga + meny) ===== -->
        <header>

            <!-- Klickbar bild som byter ödla -->
            <div class="cirkel">
                <img id="odlabild1"
                     class="circle"
                     src="./bilder/Skogsödla.jpg"
                     alt="Ödla bild"
                     onclick="bytOdlaBild()">
            </div>

            <!-- Navigationsmeny -->
            <nav>
                <a href="sida1.html">Ormar</a>
                <a href="sida2.html">Krokodiler</a>
                <a href="sida3.html" class="aktiv">Ödlor</a>
                <a href="sida4.html">Sköldpaddor</a>
            </nav>

        </header>

        <!-- ===== HUVUDINNEHÅLL ===== -->
        <main>

            <!-- Sidrubrik -->
            <h1>Ödlor</h1>

            <!-- Introduktionsbild + text -->
            <figure class="art">
                <img src="./bilder/Ödla.jpg" alt="Bild på ödla">

                <figcaption>
                    Ödlor är en mycket artrik grupp kräldjur som finns över hela världen.
                    De varierar kraftigt i storlek och levnadssätt.
                    <br><br>
                    Vissa arter som komodovaranen blir över 3 meter långa,
                    medan andra som geckoödlor bara är några centimeter.
                    <br><br>
                    De flesta ödlor har fyra ben och lång svans, men vissa arter har reducerade ben.
                </figcaption>
            </figure>

            <!-- ===== TRE INFORMATIONSKORT ===== -->
            <article>

                <!-- Sandödla -->
                <div>
                    <h2>Sandödla</h2>
                    <figure>
                        <img src="./bilder/Sandödla.JPG" alt="Bild på sandödla">
                        <p>
                            Sandödlan lever i öppna och soliga miljöer i Europa och Asien.
                            Den äter främst insekter och andra små ryggradslösa djur.
                        </p>
                    </figure>
                </div>

                <!-- Kameleont -->
                <div>
                    <h2>Kameleont</h2>
                    <figure>
                        <img src="./bilder/Kameleont.jpg" alt="Bild på kameleont">
                        <p>
                            Kameleonter är kända för sin förmåga att ändra färg.
                            De lever främst i träd och buskar och använder sin långa tunga för att fånga byten.
                        </p>
                    </figure>
                </div>

                <!-- Skogsödla -->
                <div>
                    <h2>Skogsödla</h2>
                    <figure>
                        <img src="./bilder/Skogsödla.jpg" alt="Bild på skogsödla">
                        <p>
                            Skogsödlan lever i fuktiga skogsmiljöer i Europa och Asien.
                            Den är en liten ödla som trivs i svalare klimat.
                        </p>
                    </figure>
                </div>

            </article>

            <!-- ===== VIDEO-KNAPP ===== -->
            <div class="video">
                <button onclick="spelaÖdlaVideo()">Spela video</button>
            </div>

            <!-- Video som visas vid klick -->
            <div class="video-lada">
                <iframe width="100%" height="250"
                    src="https://www.youtube.com/embed/Ni27GEZ7OdI?si=lh3ZyCu7QXTy240s"
                    title="YouTube video player"
                    frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowfullscreen>
                </iframe>
            </div>

        </main>

        <!-- ===== SIDOPANEL ===== -->
        <aside>
            <h3>Referenser:</h3>
            <ul>
                <li><a href="https://sv.wikipedia.org/wiki/Sand%C3%B6dla">Sandödla – Wikipedia</a></li>
                <li><a href="https://sv.wikipedia.org/wiki/Kameleonter">Kameleont – Wikipedia</a></li>
                <li><a href="https://sv.wikipedia.org/wiki/Skogs%C3%B6dla">Skogsödla – Wikipedia</a></li>
            </ul>
        </aside>

        <!-- ===== FOOTER ===== -->
        <footer>
            <h3>Publicerad av: Jack Carlsund TE24b</h3>
        </footer>

    </div>

    <!-- Koppling till JavaScript -->
    <script src="script.js"></script>

</body>

</html>
