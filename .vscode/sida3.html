<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reptiler</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Huvudcontainer för hela sidan -->
    <div class="kontainer">
        <!--Header som ligger högst upp-->
        <header>
            <!-- När användaren klickar på bilden byter den orm -->
            <div class="cirkel">
                <img id="odlabild1" class="circle" src="./bilder/Skogsödla.webp" alt="Ödla bild" onclick="bytOdlaBild()">
            </div>
            <!-- Navigations meny där du kan gå till andra hemsidor -->
            <nav>
                <a href="sida1.html">Ormar</a>
                <a href="sida2.html">Krokodiler</a>
                <a href="sida3.html" class="aktiv">Ödlor</a>
                <a href="sida4.html">Sköldpaddor</a>
            </nav>
        </header>
        <!-- Här är main och det mesta av innehållet ligger här -->
        <main>
            <!-- Här är sidans huvud rubrik -->
            <h1>Ödlor</h1>
            <!--Här är en stor bild och text-->
            <figure class="art">
                <img src="./bilder/Ödla.webp" alt="Bild på ödla">
                <figcaption>
                    Ödlor är en mycket artrik grupp kräldjur som finns över hela världen. <br>
                    De varierar kraftigt i storlek och levnadssätt. <br>
                    Vissa arter som komodovaranen blir över 3 meter långa, <br>
                    medan andra som geckoödlor bara är några centimeter. <br>
                    De flesta ödlor har fyra ben och lång svans, men vissa arter har reducerade ben. <br>
                </figcaption>
            </figure>
            <!--Här är tre olia subarter och information om dem-->
            <article>
                <!--Första subarten-->
                <div>
                    <h2>Sandödla</h2>
                    <figure>
                        <img src="./bilder/Sandödla.webp" alt="Bild på sandödla">
                        <p>
                            Sandödlan lever i öppna och soliga miljöer i Europa och Asien.
                            Den äter främst insekter och andra små ryggradslösa djur.
                        </p>
                    </figure>
                </div>
                <!--Andra subarten-->
                <div>
                    <h2>Kameleont</h2>
                    <figure>
                        <img src="./bilder/Kameleont.webp" alt="Bild på kameleont">
                        <p>
                            Kameleonter är kända för sin förmåga att ändra färg.
                            De lever främst i träd och buskar och använder sin långa tunga för att fånga byten.
                        </p>
                    </figure>
                </div>
                <!--Tredje subarten-->
                <div>
                    <h2>Skogsödla</h2>
                    <figure>
                        <img src="./bilder/Skogsödla.webp" alt="Bild på skogsödla">
                        <p>
                            Skogsödlan lever i fuktiga skogsmiljöer i Europa och Asien.
                            Den är en liten ödla som trivs i svalare klimat.
                        </p>
                    </figure>
                </div>
            </article>
            <!--Här är videoknappen som dyker upp-->
            <div class="video">
                <button onclick="spelaÖdlaVideo()">Spela video</button>
            </div>
            <!--Det här är information om videon som ska spelas-->
            <div class="video-lada">
                <iframe class="video-frame" height="250"
                    src="https://www.youtube.com/embed/EG5PzvdWreE?si=GNKUKeY14MbWJ6Wy" title="YouTube video player"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowfullscreen>
                </iframe>
            </div>
        </main>
        <!--Sidebaren där referenserna ska stå-->
        <aside>
            <h3>Referenser:</h3>
            <ul>
                <li><a href="https://sv.wikipedia.org/wiki/Sand%C3%B6dla">Sandödla – Wikipedia</a></li>
                <li><a href="https://sv.wikipedia.org/wiki/Kameleonter">Kameleont – Wikipedia</a></li>
                <li><a href="https://sv.wikipedia.org/wiki/Skogs%C3%B6dla">Skogsödla – Wikipedia</a></li>
            </ul>
        </aside>
        <!--Footern där det står vem som publicerat -->
        <footer>
            <h3>Publicerad av: Jack Carlsund TE24b</h3>
        </footer>
    </div>
    <script src="script.js"></script>
</body>

</html>
