        <main>
            <h1>Ormar</h1>
            <figure class="orm">
                <img src="./bilder/Snake.jpg" alt="">
                <figcaption>Ormar (Serpentes) är en underordning i ordningen fjällbärande kräldjur. De har smal kropp
                    <br>och cylindrisk kroppsform. Ormarna är växelvarma och köttätare, och vissa är kannibaler, det
                    vill
                    <br>säga de äter individer av samma art. Några arter har utvecklat ett värmekänsligt organ i nosen,
                    med
                    <br>vilket de i mörker kan känna kroppsvärmen av ett bytesdjur. Den äldsta bevarade förteckningen
                    över
                    <br>olika ormar återfinns i Brooklyn-papyrusen. De allra flesta ormar lever på land, men det finns
                    <br>ungefär ett 60-tal arter som lever i haven.[1] Havsormarna anses ha det starkaste giftet, men är
                    <br>inte aggressiva.
                </figcaption>
            </figure>
            <article>
                <div class="anakonda">
                    <h2>Anakonda</h2>
                    <figure>
                        <img src="./bilder/Anaconda.jpg" alt="">
                        <p>Arten grön anakonda räknas vanligen som den största och tyngsta ormen i världen. Den når
                            ibland en längd upp till fem meter (en individ i New Yorks zoo var 884 cm lång) och en vikt
                            upp till 150 kilogram, men de flesta individerna är av mindre storlek. På så sätt är den
                            inte längre än arten nätpyton men den är tjockare.</p>
                    </figure>
                </div>
                <div class="sjöorm">
                    <h2>Sjöorm</h2>
                    <figure>
                        <img src="./bilder/Water-snake.jpg" alt="">
                        <p>Sjöorm eller havsorm (särskilt i uttrycket stora sjöormen, stora havsormen)[1] är inom
                            sjömanstradition[2] och kryptozoologi ett fabelaktigt djur beskrivet som oerhört stora
                            vattenlevande ormar, vilket även är ett vanligt delmotiv bland flera mytologiska sjöodjur
                            och havsvidunder världen över. Fabeldjuret i sig har beskrivits som med långsträckt huvud,
                            man eller manlikande ryggfenor och röda ögon.
                        </p>
                    </figure>
                </div>
                <div class="buskmästare">
                    <h2>Buskmästare</h2>
                    <figure>
                        <img src="./bilder/Bushmaster.jpg" alt="">
                        <p>Buskmästare (Lachesis muta, även på svenska kallad bushmaster) är en art i släktet hålormar
                            (även släktet kallas ibland "buskmästare", där den här arten är typart) som lever i
                            Centralamerika söderut till subtropiska Amazonas.[1] Det är den största näsgropsormen, om än
                            inte speciellt aggressiv.</p>
                    </figure>
                </div>
            </article>
